<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zahi’s International Fruit Export Services | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, sans-serif;
}

/* ---------- BACKGROUND ---------- */
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,80,0,0.55),rgba(0,80,0,0.55)),
    url("https://images.unsplash.com/photo-1542838132-92c53300491e");
    background-size:cover;
    background-position:center;
    animation:bgMove 18s infinite alternate ease-in-out;
}

@keyframes bgMove{
    from{background-position:left;}
    to{background-position:right;}
}

/* ---------- CARD ---------- */
.container{
    width:100%;
    max-width:420px;
    padding:20px;
}

.card{
    background:#ffffff;
    border-radius:20px;
    padding:35px 30px;
    box-shadow:0 25px 60px rgba(0,0,0,0.3);
    animation:slideUp 1s ease;
}

@keyframes slideUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

/* ---------- LOGO ---------- */
.logo{
    width:90px;
    height:90px;
    margin:0 auto 10px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid #4caf50;
    animation:pulse 3s infinite;
}
.logo img{
    width:100%;
    height:100%;
    object-fit:contain;
    background:white;
}
@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(76,175,80,0.5);}
    70%{box-shadow:0 0 0 15px rgba(76,175,80,0);}
    100%{box-shadow:0 0 0 0 rgba(76,175,80,0);}
}

h1{
    text-align:center;
    font-size:20px;
    color:#2e7d32;
}
h2{
    text-align:center;
    font-size:14px;
    font-weight:400;
    margin-bottom:25px;
    color:#555;
}

/* ---------- INPUTS ---------- */
.input-group{
    margin-bottom:18px;
    position:relative;
}
.input-group input{
    width:100%;
    padding:13px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
    outline:none;
    background:#fff;
    color:#000;
}
.input-group input:focus{
    border-color:#4caf50;
}

.toggle{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#2e7d32;
    font-size:13px;
}

/* ---------- OPTIONS ---------- */
.options{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:15px;
}
.options a{
    color:#2e7d32;
    text-decoration:none;
}
.options a:hover{text-decoration:underline;}

/* ---------- BUTTON ---------- */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#66bb6a,#2e7d32);
    color:#fff;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 25px rgba(46,125,50,0.4);
}

/* ---------- LINKS ---------- */
.bottom{
    margin-top:18px;
    text-align:center;
}
.bottom a{
    color:#2e7d32;
    text-decoration:none;
    font-size:14px;
}
.bottom a:hover{text-decoration:underline;}

/* ---------- MESSAGE ---------- */
.message{
    display:none;
    margin-top:15px;
    text-align:center;
    font-weight:600;
    padding:10px;
    border-radius:10px;
    animation:pop 0.5s ease;
}
.success{
    background:#e8f5e9;
    color:#2e7d32;
}
@keyframes pop{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}

/* ---------- RESPONSIVE ---------- */
@media(max-width:480px){
    h1{font-size:18px;}
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="logo">
    <img src="logo.png" alt="Zahi Logo">
</div>

<h1>Zahi’s International</h1>
<h2>Fruit Export Services</h2>

<form id="loginForm">
    <div class="input-group">
        <input type="email" id="email" placeholder="Enter your email" required>
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Enter your password" required>
        <span class="toggle" onclick="togglePassword()">Show</span>
    </div>

    <div class="options">
        <a href="#" onclick="forgotPassword()">Forgot Password?</a>
        <a href="#" onclick="createAccount()">Create Account</a>
    </div>

    <button type="submit">Login</button>
    
    <div class="message success" id="successBox">
        ✅ Login Successful! Welcome to Zahi’s International
    </div>
</form>

</div>
</div>

<script>
function togglePassword(){
    const pwd=document.getElementById("password");
    pwd.type = pwd.type === "password" ? "text" : "password";
}

document.getElementById("loginForm").addEventListener("submit",function(e){
    e.preventDefault();
    document.getElementById("successBox").style.display="block";
});

function createAccount(){
    alert("Create Account form can be added here.\n(Frontend demo completed)");
}

function forgotPassword(){
    alert("Password reset link will be sent to your email.\n(Frontend demo completed)");
}
</script>

</body>
</html>
