<!DOCTYPE html>
<html>
<head>
    <title>Request a Quote - Zahi's International</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f8f4;
        }

        .container {
            width: 60%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2e7d32;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1b5e20;
        }

        .success-message {
            text-align: center;
            color: green;
            display: none;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Request a Quote</h2>

    <form id="quoteForm">

        <label>Full Name *</label>
        <input type="text" required>

        <label>Company Name *</label>
        <input type="text" required>

        <label>Email Address *</label>
        <input type="email" required>

        <label>Phone Number *</label>
        <input type="tel" required>

        <label>Country *</label>
        <input type="text" required>

        <label>Select Product *</label>
        <select required>
            <option value="">-- Select Product --</option>
            <option>Mango</option>
            <option>Pomegranate</option>
            <option>Banana</option>
            <option>Grapes</option>
            <option>Apple</option>
            <option>Pineapple</option>
            <option>oranges</option>
        </select>

        <label>Required Quantity (Kg / Tons) *</label>
        <input type="text" required>

        <label>Packaging Type</label>
        <select>
            <option>Carton Box</option>
            <option>Wooden Crate</option>
            <option>Custom Packaging</option>
        </select>

        <label>Destination Country *</label>
        <select>
            <option value="Not Selected">Select Your Country</option>
                <option value="Saudi Arabia">Saudi Arabia</option>
                <option value="Oman">Oman</option>
                <option value="Dammam">Dammam</option>
                <option value="Jeddah">Jeddah</option>
        </select>

        <label>Preferred Delivery Date</label>
        <input type="date">

        <label>Shipping Method</label>
        <select>
            <option>Sea Freight</option>
            
        </select>

        <label>Additional Message</label>
        <textarea rows="4"></textarea>

        <button type="submit">Request Quote</button>

        <p class="success-message" id="successMsg">
            Thank you for requesting a quotation. Our export team will contact you within 24–48 hours.
        </p>

    </form>
</div>

<script>
document.getElementById("quoteForm").addEventListener("submit", function(e) {
    e.preventDefault();
    document.getElementById("successMsg").style.display = "block";
    this.reset();
});




const scriptURL = 'https://script.google.com/macros/s/AKfycbxtRvtXyqjanhO7W42CogSvM8aTBaTvOigUy-cTequiGbF6aaioimDtet4vZY1EZ1IqMQ/exec';

document.getElementById('quoteForm').addEventListener('submit', e => {
  e.preventDefault();
  
  const formData = {
    fullName: document.querySelector('input[name="fullName"]').value,
    companyName: document.querySelector('input[name="companyName"]').value,
    email: document.querySelector('input[name="email"]').value,
    phone: document.querySelector('input[name="phone"]').value,
    country: document.querySelector('input[name="country"]').value,
    product: document.querySelector('select[name="product"]').value,
    quantity: document.querySelector('input[name="quantity"]').value,
    packaging: document.querySelector('select[name="packaging"]').value,
    destination: document.querySelector('select[name="destination"]').value,
    message: document.querySelector('textarea[name="message"]').value
  };

  fetch(scriptURL, {
    method: 'POST',
    body: JSON.stringify(formData)
  })
  .then(response => alert("Quote Request Submitted Successfully!"))
  .catch(error => alert("Error!"));
});
</script>


</body>
</html>
